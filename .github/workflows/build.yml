name: Build Wemos D1 Pro APK Debug

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: 18
  JAVA_VERSION: 17
  CORDOVA_VERSION: "13.0.0"
  CORDOVA_ANDROID_VERSION: "13.0.0"

jobs:
  build-apk-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            platforms/android/.gradle
          key: ${{ runner.os }}-gradle-api34-${{ hashFiles('**/package.json', '**/config.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-api34-
            ${{ runner.os }}-gradle-
      - name: Install Cordova CLI
        run: |
          npm install -g cordova@${{ env.CORDOVA_VERSION }}
          cordova --version
      - name: Install npm dependencies
        run: npm ci || npm install
      - name: Clean old platforms and plugins
        run: rm -rf platforms/ plugins/ node_modules/cordova-android
      - name: Add Android Platform
        run: cordova platform add android@${{ env.CORDOVA_ANDROID_VERSION }} --save
      - name: Install Cordova Plugins
        run: |
          cordova plugin add cordova-plugin-background-mode --save
          cordova plugin add cordova-plugin-local-notification --save
          cordova plugin add cordova-plugin-insomnia --save
          cordova plugin add cordova-plugin-statusbar --save
          cordova plugin add cordova-plugin-vibration --save
          cordova plugin add cordova-plugin-network-information --save
          cordova plugin add cordova-plugin-device --save
          cordova plugin add cordova-plugin-android-permissions --save
          cordova plugin add cordova-plugin-foreground-service --save
          cordova plugin list
      - name: Verify project structure
        run: |
          ls -la
          ls -la www/ || echo "WARNING: www folder not found"
          cordova info || true
      - name: Copy build-extras.gradle
        run: |
          mkdir -p platforms/android/app
          cp build-extras.gradle platforms/android/app/build-extras.gradle
          cat platforms/android/app/build-extras.gradle
      - name: Build Debug APK
        run: cordova build android --debug --no-telemetry
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
      - name: Verify APK output
        run: |
          ls -la platforms/android/app/build/outputs/apk/debug/
          find platforms/android/app/build/outputs/apk -name "*.apk" -exec ls -lah {} +
      - name: Rename and organize APK
        run: |
          mkdir -p artifacts
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          APK_NAME="WemosPro-v4.2.0-debug-${TIMESTAMP}-${SHORT_SHA}.apk"
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk artifacts/${APK_NAME}
          ls -lah artifacts/
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wemos-pro-debug-${{ github.run_number }}-${{ github.sha }}
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: error
      - name: Build Summary
        run: |
          echo "BUILD SUCCESSFUL - WEMOS D1 PRO"
          echo "APK File: ${{ env.APK_NAME }}"
          echo "API Level: 34 (Android 14)"
          echo "JDK: 17"
          echo "Cordova CLI: ${{ env.CORDOVA_VERSION }}"
          echo "cordova-android: ${{ env.CORDOVA_ANDROID_VERSION }}"
          echo "Build Type: DEBUG"
          echo "Download APK di tab Actions -> Artifacts"
