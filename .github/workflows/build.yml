name: Build Wemos D1 Pro APK Debug

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: 18
  JAVA_VERSION: 17
  CORDOVA_VERSION: "13.0.0"
  CORDOVA_ANDROID_VERSION: "13.0.0"
  ANDROID_SDK_VERSION: "34.0.0"

jobs:
  build-apk-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
       env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            platforms/android/.gradle
          key: ${{ runner.os }}-gradle-api34-${{ hashFiles('**/package.json', '**/config.xml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-api34-
            ${{ runner.os }}-gradle-

      - name: Install Cordova CLI
        run: |
          npm install -g cordova@${{ env.CORDOVA_VERSION }}
          cordova --version

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Remove old Android platform & clean caches
        run: |
          cordova platform rm android || true
          rm -rf platforms/android
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "Platform lama & cache Gradle dihapus."

      - name: Add Android Platform
        run: |
          cordova platform add android@${{ env.CORDOVA_ANDROID_VERSION }} --save
          
        - name: Inject Kotlin exclude rules to build.gradle
        run: |
          echo -e "\nallprojects {\n    configurations.all {\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'\n        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'\n    }\n}" >> platforms/android/build.gradle
          echo "Kotlin exclude rules injected."

      - name: Install Cordova Plugins
        run: |
          cordova plugin add cordova-plugin-background-mode --save
          cordova plugin add cordova-plugin-local-notification --save
          cordova plugin add cordova-plugin-insomnia --save
          cordova plugin add cordova-plugin-statusbar --save
          cordova plugin add cordova-plugin-vibration --save
          cordova plugin add cordova-plugin-network-information --save
          cordova plugin add cordova-plugin-device --save
          cordova plugin add cordova-plugin-android-permissions --save
          cordova plugin add cordova-plugin-foreground-service --save
          cordova plugin list

      - name: Verify project structure
        run: |
          ls -la
          ls -la www/ || echo "WARNING: www folder not found"
          cat config.xml | head -20
          cordova info || true

      - name: Copy build-extras.gradle
        run: |
          mkdir -p platforms/android/app
          cp build-extras.gradle platforms/android/app/build-extras.gradle
          cat platforms/android/app/build-extras.gradle

      - name: Build debug APK
        run: cordova build android --debug
    

      - name: Verify APK output
        run: |
          ls -la platforms/android/app/build/outputs/apk/debug/
          find platforms/android/app/build/outputs/apk -name "*.apk" -exec ls -lah {} +

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
